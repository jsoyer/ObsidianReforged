name: 🐳 Build & Push

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

env:
  IMAGE: jsoyer/obsidian-reforged

jobs:
  build:
    name: Build multi-arch image
    runs-on: ubuntu-latest

    # Expose whether Docker Hub secrets are configured as a job-level env var.
    # secrets context is not allowed in step-level if: conditions,
    # but env context is — so we bridge via a job env variable.
    env:
      DOCKERHUB_ENABLED: ${{ secrets.DOCKERHUB_TOKEN != '' }}

    permissions:
      contents: read
      packages: write
      id-token: write   # required for OIDC keyless signing (cosign) and provenance

    steps:
      - uses: actions/checkout@v4

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Set up QEMU (cross-arch emulation)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: env.DOCKERHUB_ENABLED == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine target registries
        id: registries
        shell: bash
        run: |
          # Multiline step outputs require the heredoc format in GITHUB_OUTPUT
          {
            echo 'images<<__EOF__'
            [[ "${DOCKERHUB_ENABLED}" == "true" ]] && echo "${{ env.IMAGE }}"
            echo "ghcr.io/${{ github.repository }}"
            echo '__EOF__'
          } >> "$GITHUB_OUTPUT"

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.registries.outputs.images }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Build.Dockerfile
          platforms: linux/amd64,linux/amd64/v2,linux/amd64/v3,linux/arm64,linux/arm/v7,linux/riscv64,linux/s390x,linux/ppc64le
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          sbom: true
          provenance: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Sign image on GHCR (keyless via Sigstore OIDC)
        # Verification: cosign verify --certificate-identity-regexp "github.com/jsoyer" \
        #               --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
        #               ghcr.io/jsoyer/obsidianreforged:latest
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
          REPO: ${{ github.repository }}
        run: cosign sign --yes "ghcr.io/${REPO,,}@${DIGEST}"

      - name: Sign image on Docker Hub (keyless via Sigstore OIDC)
        if: env.DOCKERHUB_ENABLED == 'true'
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: cosign sign --yes "${{ env.IMAGE }}@${DIGEST}"
