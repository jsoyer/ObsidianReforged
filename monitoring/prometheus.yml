global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - alert_rules.yml

scrape_configs:
  - job_name: minecraft
    static_configs:
      - targets: ['minecraft-exporter:9940']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'obsidian-reforged'
