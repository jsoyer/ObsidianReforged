# ObsidianReforged — Minecraft Java + Geyser + Floodgate Docker Compose
# GitHub: https://github.com/jsoyer/ObsidianReforged
#
# To run multiple servers: change the volume name under both "volumes" sections
# and map different host ports.

services:
  minecraft:
    image: jsoyer/obsidian-reforged:latest
    restart: "unless-stopped"
    ports:
      - 25565:25565
      - 19132:19132/udp
    volumes:
      - minecraft:/minecraft
    stdin_open: true # required for Minecraft interactive console
    tty: true
    healthcheck:
      test: ["CMD", "bash", "-c", "echo > /dev/tcp/localhost/25565"]
      interval: 30s
      timeout: 10s
      start_period: 120s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 2g
          cpus: '1.5'
        reservations:
          memory: 512m
          cpus: '0.5'
    environment:
      Port: "25565"
      BedrockPort: "19132"
      TZ: "America/Denver"
      #BackupCount: 10       # Number of rolling backups to keep
      #MaxMemory: 2048       # Maximum JVM heap in MB (keep below container memory limit)
      #Version: "1.21.11"   # Pin a specific Minecraft version
      #NoBackup: "plugins"  # Comma-separated folders to exclude from backups
      #NoPermCheck: "Y"     # Skip permissions check on startup
      #NoViaVersion: "Y"    # Disable ViaVersion plugin
      #QuietCurl: "Y"       # Suppress curl download progress output
      #GeyserVersion: ""    # Pin Geyser to a specific version (e.g. "2.4.0"), empty = latest
      #FloodgateVersion: "" # Pin Floodgate to a specific version, empty = latest

volumes:
  minecraft:
    driver: local
